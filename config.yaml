# Phase 1 Configuration - Multiple Sensor Monitor
# Medical Device Prototype - Spine Cooling Runtime

# SIMULATION MODE:
# Run with: python src/main.py --sim
# This enables manual sensor control via the Simulation tab in the UI
# Without --sim flag, the application uses real GPIO sensors

bussser:  16


sensors:
  - name: "Level Low"
    gpio_pin: 12
    active_high: true
    pull_up: true
  - name: "Level Critical"
    gpio_pin: 20
    active_high: true
    pull_up: true
  - name: "Cartridge In Place"
    gpio_pin: 19
    active_high: true
    pull_up: true

sample_rate_hz: 1.0         # Read sensors once per second

thermocouples:
  enabled: true
  stack: 0
  i2c_bus: 1
  channels: [1, 2, 3, 4]
  labels:
    1: "Body Temp"
    2: "Plate Temp"
    3: "Temp 3"
    4: "Temp 4"

logging:
  csv_directory: "data/csv"
  filename_format: "sensor_log_%Y%m%d_%H%M%S.csv"

ui:
  window_width: 500
  window_height: 450
  update_interval_ms: 100   # Update UI every 100ms

# Stepper motor driver configuration (STMicroelectronics STSPIN220)
stepper_motor:
  driver: "TB6600"         # Low-voltage stepper driver (1.8 V - 10 V, 1.3 A RMS)

  # Motor specification
  steps_per_revolution: 200    # Full steps per revolution (1.8° motor)
  microstepping: 4           # set on the driver manually

  # Motion
  default_speed_rpm: 30
  max_speed_rpm: 600

  # Safety / power
  enable_on_startup: false    # Leave motor de-energised at boot
  disable_on_idle: true       # Release EN/FAULT between moves
  en_active_high: false       # Set false if ON/OFF behavior is inverted

  # BCM GPIO pin assignment for the STSPIN220 control lines (simplified)
  pins:
    en_fault: 24              # EN/FAULT   (active-high enable, open-drain fault out)
    step: 5                  # STCK       (step clock, rising edge)
    dir: 25                   # DIR        (direction)



