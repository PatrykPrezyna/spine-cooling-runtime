app:
  name: spine_cooling
  log_path: logs/spine_cooling.log
  data_path: data
  db_path: data/spine_cooling.db
  csv_folder: data/csv
  csv_rotate_size_mb: 5
  csv_rotate_count: 5
  sensor_poll_interval_s: 0.1
  logger_poll_interval_s: 0.1
  ui_update_interval_ms: 200
  compressor_poll_interval_s: 0.5
  watchdog_interval_s: 15
  watchdog_timeout_s: 30
  daemonize: false

hardware:
  spi_bus: 0
  spi_device: 0
  sensor_cs_pins:
    - 5
    - 6
    - 12
    - 13
    - 16
  uart_port: /dev/ttyAMA0
  uart_baudrate: 19200
  watchdog_reset_pin: 17

thresholds:
  cooling_enable_c: 65.0
  cooling_disable_c: 55.0
  alarm_c: 90.0
  fault_c: 100.0
