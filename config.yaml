control_temp_label: CSF
alarms:
  csf_label: CSF
  csf_low_temp_c: 28.0
  heat_ex_label: Heat Ex
  heat_ex_min_c: -10.0
  leak_pressure_delta_min: 5.0
  # Digital leak sensor: a 0/low reading means fluid detected -> immediate stop.
  leak_sensor_label: Leak Sensor
  # Ignore brief flicker: the leak line must stay low this long before tripping.
  leak_debounce_s: 0.5
  cooling_ineffective_timeout_s: 600
  cooling_ineffective_csf_delta_c: 0.2
  battery_low_pct: 20
simulation:
  csf_label: CSF
  csf_initial_c: 37.0
  csf_max_c: 37.0
  csf_min_c: 25.0
  csf_rate_c_per_s: 0.1
  csf_cart_out_scale: 0.05
  csf_min_effective_pump_speed_rpm: 20
  csf_pump_speed_ref_rpm: 60
  heat_ex_label: Heat Ex
  heat_ex_initial_c: 22.0
  heat_ex_max_c: 22.0
  heat_ex_cool_rate_c_per_s: 0.5
  heat_ex_warm_rate_c_per_s: 0.02
  cart_in_label: Cart In
  cart_out_label: Cart Out
  cart_initial_c: 22.0
  cart_in_rise_rate_c_per_s: 0.1
  sensors:
    Cartridge In Place: true
    Level Low: true
    Level Critical: true
    Leak Sensor: true
  pressures:
    Cartridge Input: 20.0
    Cartridge Output: 15.0
    Pump Input: 25.0
    Pump Output: 30.0
  thermistors:
    CSF: 37.0
    CSF 2: 36.5
    Cart In: 22.0
    Cart Out: 22.0
    Heat Ex: 22.0
    Heat Ex 2: 22.0
    Temp 7: 22.0
    Temp 8: 22.0
acustic_signal_gpio_pin: 16
sensors:
- name: Level Low
  gpio_pin: 12
  active_high: true
  pull_up: true
- name: Level Critical
  gpio_pin: 20
  active_high: true
  pull_up: true
- name: Cartridge In Place
  gpio_pin: 19
  active_high: true
  pull_up: true
# Leak detector: line is held high when dry; a leak pulls it low (0).
- name: Leak Sensor
  gpio_pin: 26
  active_high: true
  pull_up: true
sample_rate_hz: 1.0
thermocouples:
  enabled: true
  stack: 0
  i2c_bus: 1
  sensor_types:
    1: T
    2: T
    3: K
    4: K
    5: K
    6: K
    7: K
    8: K
  channels:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  labels:
    1: CSF
    2: CSF 2
    3: Cart In
    4: Cart Out
    5: Heat Ex
    6: Heat Ex 2
    7: Temp 7
    8: Temp 8
  calibration:
    default:
      measured_at_0c: 0.0
      measured_at_100c: 100.0
    channels:
      1:
        measured_at_0c: 0.0
        measured_at_100c: 97.7
      2:
        measured_at_0c: 0.3
        measured_at_100c: 99.1
      6:
        measured_at_0c: 0.3
        measured_at_100c: 98.3
      7:
        measured_at_0c: -0.3
        measured_at_100c: 98.3
      8:
        measured_at_0c: 1.7
        measured_at_100c: 89.5
# Thermistor temperatures on two ADS1115 chips (up to 8 channels).
# Channels 0-3 → first address, 4-7 → second. Labels match thermocouples.
# Conversion is piecewise-linear in mV.
thermistor_sensors:
  enabled: true
  i2c_addresses:
  - 72   # 0x48 — thermistors 0-3
  - 73   # 0x49 — thermistors 4-7
  gain: '1'
  data_rate: 128
  channels:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  labels:
    0: CSF
    1: CSF 2
    2: Cart In
    3: Cart Out
    4: Heat Ex
    5: Heat Ex 2
    6: Temp 7
    7: Temp 8
  conversion:
    points_mv_c:
    - [616.0, 0.0]
    - [142.0, 37.0]
    - [87.0, 50.0]
# Differential pressure sensors on a third + fourth ADS1115 (up to 4 sensors).
# Each sensor uses one differential pair (2 analog inputs), so one chip serves
# two sensors: channels 0-1 on the first address, 2-3 on the second.
# Linear calibration: mV → psi (same for all sensors).
# Read rate follows ui.update_interval_ms (100 ms → 10 Hz) and is logged to CSV.
pressure_sensors:
  enabled: true
  sample_rate_hz: 10
  i2c_addresses:
  - 74   # 0x4A — Cartridge Input (P0-P1), Cartridge Output (P2-P3)
  - 75   # 0x4B — Pump Input (P0-P1), Pump Output (P2-P3)
  gain: 16  # ±0.256 V
  channels:
  - 0
  - 1
  - 2
  - 3
  calibration:
    mv_lo: -14.858
    psi_lo: -11.5
    mv_hi: 96.9
    psi_hi: 75.0
  channel_configs:
    0:
      label: Cartridge Input
    1:
      label: Cartridge Output
    2:
      label: Pump Input
    3:
      label: Pump Output
compressor:
  relay_pin: 6
  heat_ex_label: Heat Ex
  off_below_temp_c: -11
  on_above_temp_c: -9.0
logging:
  csv_directory: data/csv
  filename_format: sensor_log_%Y%m%d_%H%M%S.csv
# Pump throughput: flow scales linearly with stepper RPM. Slope from a
# least-squares fit (through the origin) of the measured calibration data.
# flow_ml_per_s = pump_rpm * pump_flow_ml_per_min_per_rpm / 60
pump_flow_ml_per_min_per_rpm: 0.7823
ui:
  window_width: 500
  window_height: 450
  update_interval_ms: 100  # 10 Hz IO / pressure / CSV tick
  fullscreen: true
stepper_motor:
  driver: TB6600
  steps_per_revolution: 200
  microstepping: 16
  default_speed_rpm: 20
  pumping_speed_rpm: 60
  pumping_slow_speed_rpm: 20
  max_speed_rpm: 390
  min_pump_speed_rpm: 1
  min_speed_rpm: 1
  ramp_start_fraction: 0.5
  continuous_direction: -1
  enable_on_startup: false
  disable_on_idle: true
  en_active_high: false
  pins:
    en_fault: 24
    step: 5
    dir: 25
