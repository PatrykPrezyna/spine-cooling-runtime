control_temp_label: CSF 2
alarms:
  csf_label: CSF 2
  csf_low_temp_c: 28.0
  heat_ex_label: Heat Ex
  heat_ex_min_c: -10.0
  leak_pressure_delta_min: 5.0
  cooling_ineffective_timeout_s: 600
  cooling_ineffective_csf_delta_c: 0.2
  battery_low_pct: 20
simulation:
  csf_label: CSF 2
  csf_initial_c: 37.0
  csf_max_c: 37.0
  csf_min_c: 25.0
  csf_rate_c_per_s: 0.1
  csf_cart_out_scale: 0.05
  csf_min_effective_pump_speed_rpm: 30
  csf_pump_speed_ref_rpm: 120
  heat_ex_label: Heat Ex
  heat_ex_initial_c: 22.0
  heat_ex_max_c: 22.0
  heat_ex_cool_rate_c_per_s: 0.5
  heat_ex_warm_rate_c_per_s: 0.02
  cart_in_label: Cart In
  cart_out_label: Cart Out
  cart_initial_c: 22.0
  cart_in_rise_rate_c_per_s: 0.1
  sensors:
    Cartridge In Place: true
    Level Low: true
    Level Critical: true
  pressures:
    Pressure 1: 120.0
    Pressure 2: 95.0
acustic_signal_gpio_pin: 16
sensors:
- name: Level Low
  gpio_pin: 12
  active_high: true
  pull_up: true
- name: Level Critical
  gpio_pin: 20
  active_high: true
  pull_up: true
- name: Cartridge In Place
  gpio_pin: 19
  active_high: true
  pull_up: true
sample_rate_hz: 1.0
thermocouples:
  enabled: true
  stack: 0
  i2c_bus: 1
  sensor_types:
    1: T
    2: T
    3: K
    4: K
    5: K
    6: K
    7: K
    8: K
  channels:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  labels:
    1: CSF 2
    2: CSF
    3: Cart In
    4: Cart Out
    5: Heat Ex
    6: Heat Ex 2
    7: Temp 7
    8: Temp 8
  calibration:
    default:
      measured_at_0c: 0.0
      measured_at_100c: 100.0
    channels:
      1:
        measured_at_0c: 1.0
        measured_at_100c: 99.0
pressure_sensors:
  enabled: true
  i2c_address: 72
  gain: '1'
  data_rate: 128
  channels:
  - 0
  - 1
  channel_configs:
    0:
      label: Pressure 1
      voltage_min: 0.5
      voltage_max: 4.5
      pressure_min: 0.0
      pressure_max: 300.0
    1:
      label: Pressure 2
      voltage_min: 0.5
      voltage_max: 4.5
      pressure_min: 0.0
      pressure_max: 300.0
compressor:
  relay_pin: 6
  heat_ex_label: Heat Ex
  off_below_temp_c: 3
  on_above_temp_c: 7.0
logging:
  csv_directory: data/csv
  filename_format: sensor_log_%Y%m%d_%H%M%S.csv
ui:
  window_width: 500
  window_height: 450
  update_interval_ms: 100
  fullscreen: true
stepper_motor:
  driver: TB6600
  steps_per_revolution: 200
  microstepping: 16
  default_speed_rpm: 30
  pumping_speed_rpm: 120
  pumping_slow_speed_rpm: 20
  max_speed_rpm: 240
  continuous_direction: -1
  enable_on_startup: false
  disable_on_idle: true
  en_active_high: false
  pins:
    en_fault: 24
    step: 5
    dir: 25
